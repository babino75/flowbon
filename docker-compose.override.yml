services:
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql://flowbon:flowbon123@db:5432/flowbon
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://backend:8000
    command: ["npm", "run", "dev"]

  db:
    ports:
      - "5432:5432"
