services:
  db:
    image: postgres:16
    container_name: flowbon-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - flowbon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowbon -d flowbon"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: flowbon-backend
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - .env
    networks:
      - flowbon
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: flowbon-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - flowbon

  nginx:
    image: nginx:latest
    container_name: flowbon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - flowbon

  maildev:
    image: maildev/maildev
    container_name: flowbon-maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - flowbon

volumes:
  pgdata:

networks:
  flowbon:
    driver: bridge

